body{

header{

font-weight:800;
text-decoration:none;

}

.btn-whatsapp{
background:#25d366;
color:white;
}

.btn-whatsapp:hover{
transform:scale(1.05);
}

.btn-call{
background:#0f766e;
color:white;
}

.btn-call:hover{
transform:scale(1.05);
}

footer{
padding:30px;
text-align:center;
font-size:18px;
color:#777;
margin-top:60px;
}

@media(max-width:768px){

h1{
font-size:42px;
}

.description{
font-size:20px;
}

.feature{

}

.btn{
